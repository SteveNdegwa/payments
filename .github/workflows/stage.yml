name: Deploy stage payments app

on:
  workflow_dispatch:
  push:
    branches:
      - develop

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  deploy-stage:
    name: Build and deploy stage payments
    runs-on: self-hosted

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set image version
        id: get-image-tag
        run: |
          GIT_HASH=$(git rev-parse --short "${GITHUB_SHA}")
          echo "image_tag=${GITHUB_REF##*/}-${GIT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to gitlab registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_USER }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push to gitlab registry
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: registry.gitlab.com/spin_mobile/payments:${{ steps.get-image-tag.outputs.image_tag }}

      - name: Set up helm
        id: install-helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Set up kubectl
        id: install-kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.33.3

      - name: helm template and update argo deploy image
        shell: bash
        run: |
          helm repo add spinm https://etowett.github.io/helm-charts
          [[ -d app ]] && rm -rf app
          helm fetch spinm/app --version 1.3.1 --untar

          helm template payments ./app \
            --set image.tag=${{ steps.get-image-tag.outputs.image_tag }} \
            --set hook.image.tag=${{ steps.get-image-tag.outputs.image_tag }} \
            --namespace=stage-ke \
            -f helm/stage.yml \
            --output-dir stage/${{ steps.get-image-tag.outputs.image_tag }}
          cd stage/${{ steps.get-image-tag.outputs.image_tag }}
          cp app/templates/*.yaml .
          rm -rf app
          cd ../../

          git clone https://${{ secrets.GITLAB_USER }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/spin_mobile/argo-k8s-releases.git
          cd argo-k8s-releases
          git checkout main

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          mkdir -p apps/payments/stage/${{ steps.get-image-tag.outputs.image_tag }}
          cp ../stage/${{ steps.get-image-tag.outputs.image_tag }}/* apps/payments/stage/${{ steps.get-image-tag.outputs.image_tag }}
          git add apps/payments/stage/${{ steps.get-image-tag.outputs.image_tag }}
          echo "updating argocd application deployment"
          OLD_PATH=`cat argo-apps/stage-ke-payments.yml | grep path | awk '{print $2}'`
          read OLD_TAG <<< "${OLD_PATH##*/}"
          sed -i "s/$OLD_TAG/${{ steps.get-image-tag.outputs.image_tag }}/" argo-apps/stage-ke-payments.yml
          git add argo-apps/stage-ke-payments.yml
          git commit -m "pushed for stage with payments ${{ steps.get-image-tag.outputs.image_tag }}"
          git push origin main
