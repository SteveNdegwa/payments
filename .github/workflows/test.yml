name: Spin Payments Service CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: self-hosted

    env:
      SECRET_KEY: test-secret
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DJANGO_SETTINGS_MODULE: spin_payments.settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure C toolchain available
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff linting
        run: uv run ruff check --output-format=github .

      - name: Run Ruff formatting check
        run: uv run ruff format --check .

      - name: Check Python syntax
        run: |
          uv run python -m py_compile manage.py
          find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" | xargs uv run python -m py_compile

      - name: Django system checks
        run: |
          uv run python manage.py check
          uv run python manage.py check --tag security
          uv run python manage.py check --tag compatibility

      - name: Test WSGI application loading
        run: uv run python -c "from spin_payments.wsgi import application; print('WSGI application loaded successfully')"

      - name: Test ASGI application loading
        run: uv run python -c "from spin_payments.asgi import application; print('ASGI application loaded successfully')"

      - name: Test static files collection
        run: uv run python manage.py collectstatic --noinput --dry-run

      - name: Apply migrations
        run: uv run python manage.py migrate --noinput

      - name: Test /healthz endpoint
        run: |
          uv run python manage.py runserver 0.0.0.0:8000 &
          SERVER_PID=$!
          sleep 5
          curl -f http://localhost:8000/healthz || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker buildx build --load -t spin_payments:test .

      - name: Docker image django check
        run: docker run --rm -e SECRET_KEY=test-secret -e DEBUG=1 -e ALLOWED_HOSTS='*' spin_payments:test python manage.py check

      - name: Run Django tests
        run: uv run python manage.py test --verbosity=2
