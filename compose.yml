services:
  app:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --timeout 300 spin_payments.wsgi:application -w 2
    working_dir: /usr/src/app
    ports:
      - 8000:8000
    environment:
      - ENV=local
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - SECRET_KEY=django-insecure-cogu1s%!x&tm+it74)6inzov0bg82lympp^6*kc0@+2rz8^v28
      - APP_PATH=/var/www/spin_payments
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DATABASE_DB=payments
      - DATABASE_USER=payments
      - DATABASE_PASSWORD=payments
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    depends_on:
      rabbitmq:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    networks:
      - spin_payments_net

  worker:
    build: .
    command: celery -A spin_payments worker --loglevel=info
    working_dir: /usr/src/app
    environment:
      - ENV=local
      - DEBUG=1
      - SECRET_KEY=django-insecure-cogu1s%!x&tm+it74)6inzov0bg82lympp^6*kc0@+2rz8^v28
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DATABASE_DB=payments
      - DATABASE_USER=payments
      - DATABASE_PASSWORD=payments
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    depends_on:
      rabbitmq:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    networks:
      - spin_payments_net

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=payments
      - POSTGRES_USER=payments
      - POSTGRES_PASSWORD=payments
    ports:
      - 5432:5432
    volumes:
      - spin_payments_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - spin_payments_net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - spin_payments_net

volumes:
  spin_payments_pgdata:

networks:
  spin_payments_net:
